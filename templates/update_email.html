{% extends "base.html" %}

{% block title %}Update Email | Social Post{% endblock %}

{% block page_header %}
<section class="hero-panel mb-4">
    <p class="eyebrow">Profile</p>
    <h1 class="hero-title">Update Email Address</h1>
    <p class="hero-subtitle">Keep your account email current so you can stay reachable.</p>
</section>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
        <article class="rounded-4 p-4 p-lg-5"
            style="background: rgba(255,255,255,0.88); border: 1px solid rgba(31,42,46,0.08);">
            <h2 class="h4 fw-bold mb-4">User #{{ user.id }}</h2>

            <form method="post" action="{{ url_for('update_email', user_id=user.id) }}">
                <div class="mb-3">
                    <label for="old_email" class="form-label fw-semibold">Current Email</label>
                    <input type="email" id="old_email" class="form-control form-control-lg" value="{{ user.email }}" readonly>
                </div>

                <div class="mb-4">
                    <label for="new_email" class="form-label fw-semibold">New Email</label>
                    <input type="email" id="new_email" name="new_email" class="form-control form-control-lg"
                        placeholder="new-address@example.com" required>
                </div>

                <div class="d-grid d-sm-flex gap-2">
                    <button type="submit" class="btn btn-brand px-4 py-2">Save Changes</button>
                    <a href="{{ url_for('dashboard', user_id=current_user.id) }}" class="btn btn-outline-secondary rounded-pill px-4 py-2 fw-semibold">Cancel</a>
                </div>
            </form>
        </article>
    </div>
</div>
{% endblock %}
